name: Repair Server

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  repair:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DO_SSH_KEY }}
        
    - name: Add host to known_hosts
      run: ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts
      
    - name: Repair PM2 and start server
      env:
        DO_HOST: ${{ secrets.DO_HOST }}
        DO_USER: ${{ secrets.DO_USER }}
      run: |
        ssh $DO_USER@$DO_HOST << 'EOF'
          # Install pm2 globally if not present
          if ! command -v pm2 &> /dev/null; then
            echo "Installing pm2..."
            sudo npm install -g pm2
          fi
          
          cd /opt/service-business
          
          # Pull latest code
          git pull
          
          # Install dependencies
          npm install
          
          # Build
          npm run build
          
          # Stop any existing process
          pm2 delete service-business-api 2>/dev/null || true
          
          # Start fresh
          pm2 start dist/api.js --name service-business-api
          
          # Save pm2 config
          pm2 save
          
          # Show status
          pm2 list
          
          echo "Server repair complete!"
        EOF
