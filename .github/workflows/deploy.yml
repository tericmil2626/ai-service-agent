name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build TypeScript
      run: npm run build
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DO_SSH_KEY }}
        
    - name: Add host to known_hosts
      run: ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts
      
    - name: Deploy to DigitalOcean
      env:
        DO_HOST: ${{ secrets.DO_HOST }}
        DO_USER: ${{ secrets.DO_USER }}
        GCAL_CLIENT_SECRET: ${{ secrets.GCAL_CLIENT_SECRET }}
      run: |
        # Create data directory and client_secret.json on server
        ssh $DO_USER@$DO_HOST 'mkdir -p /root/service-business/data'
        ssh $DO_USER@$DO_HOST "echo '$GCAL_CLIENT_SECRET' > /root/service-business/data/client_secret.json"
        ssh $DO_USER@$DO_HOST 'chmod 600 /root/service-business/data/client_secret.json'
        
        # Copy files to server (correct path: /root/service-business/)
        scp -r dist/* $DO_USER@$DO_HOST:/root/service-business/dist/
        scp package.json package-lock.json $DO_USER@$DO_HOST:/root/service-business/
        
    - name: Restart service
      env:
        DO_HOST: ${{ secrets.DO_HOST }}
        DO_USER: ${{ secrets.DO_USER }}
      run: |
        ssh $DO_USER@$DO_HOST '
          # Set PATH for PM2 and Node
          export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:$HOME/.local/bin:/usr/local/bin:$PATH"
          
          cd /root/service-business || exit 1
          
          # Install production dependencies
          npm ci --production
          
          # Stop and delete existing process
          pm2 stop service-business-api 2>/dev/null || true
          pm2 delete service-business-api 2>/dev/null || true
          
          # Wait a moment
          sleep 2
          
          # Start fresh (entry point is dist/src/api.js)
          pm2 start dist/src/api.js --name service-business-api
          
          # Save config
          pm2 save
          
          # Show status
          pm2 status
        '
