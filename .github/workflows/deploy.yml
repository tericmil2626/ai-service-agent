name: Deploy to DigitalOcean

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build TypeScript
      run: npm run build
      
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DO_SSH_KEY }}
        
    - name: Add host to known_hosts
      run: ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts
      
    - name: Deploy to DigitalOcean
      env:
        DO_HOST: ${{ secrets.DO_HOST }}
        DO_USER: ${{ secrets.DO_USER }}
      run: |
        scp -r dist/* $DO_USER@$DO_HOST:/opt/service-business/dist/
        
    - name: Restart service
      env:
        DO_HOST: ${{ secrets.DO_HOST }}
        DO_USER: ${{ secrets.DO_USER }}
      run: |
        ssh $DO_USER@$DO_HOST '
          # Set PATH for PM2 and Node
          export PATH="$HOME/.nvm/versions/node/$(ls $HOME/.nvm/versions/node 2>/dev/null | tail -1)/bin:$HOME/.local/bin:/usr/local/bin:$PATH"
          
          cd /opt/service-business || exit 1
          
          # Check if PM2 process exists
          if pm2 describe service-business-api > /dev/null 2>&1; then
            echo "Reloading existing PM2 process..."
            pm2 reload service-business-api --update-env
          else
            echo "Starting new PM2 process..."
            pm2 start dist/api.js --name service-business-api
          fi
          
          # Save config
          pm2 save
          
          # Show status
          pm2 status
        '
